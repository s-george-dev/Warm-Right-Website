<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarmHub - Testimonials | Warm Right Ltd</title>
      <link rel="icon" href="../assets/images/favicon.png">

  <link rel="stylesheet" href="../assets/css/admin.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>window.adminPageTitle = "WarmHub - Testimonials";</script>
  <script src="../assets/js/admin-include.js"></script>
  
  <style>
    :root {
      --primary-blue: #004a99;
      --accent-orange: #ff8c00;
      --light-gray: #f4f7f6;
      --white: #ffffff;
      --text-dark: #333;
    }

    /* 1. Hide body until security check & header load is complete */
    body { 
      font-family: 'Segoe UI', sans-serif; 
      margin: 0; 
      background: var(--light-gray); 
      color: var(--text-dark); 
      padding: 40px; 
      visibility: hidden; 
    }

    /* 2. Header Layout Fix: Counteracts the 40px body padding */
    #admin-header-container {
      margin: -40px -40px 30px -40px; 
    }

    /* Containers */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
    #table-view, #form-view { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .hidden { display: none !important; }

    /* Form Split Layout */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    .form-left label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: var(--primary-blue); }
    .form-left input, .form-left textarea, .form-left select { 
      width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; 
    }

    /* Multi-Image Gallery Styling */
    .form-right { background: #fafafa; border: 2px dashed #ddd; border-radius: 12px; padding: 20px; text-align: center; }
    #image-gallery { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
      gap: 10px; 
      width: 100%; 
      margin-top: 15px; 
    }
    .gallery-item { position: relative; }
    .gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: block; }
    .gallery-remove {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.92);
      color: #fff;
      line-height: 1;
    }
    .pending-panel { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid #e5e7eb; }
    .status-pill { display: inline-flex; padding: 4px 9px; border-radius: 999px; background: #fff7ed; color: #c2410c; font-size: 12px; font-weight: 800; }

    /* Buttons */
    button { padding: 10px 18px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--primary-blue); color: white; }
    .btn-accent { background: var(--accent-orange); color: white; }
    .btn-outline { background: transparent; border: 1px solid #ccc; color: #666; }
    
    /* Professional Table */
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { text-align: left; background: #f9f9f9; padding: 15px; color: var(--primary-blue); border-bottom: 2px solid #eee; }
    td { padding: 15px; border-bottom: 1px solid #eee; }
    .type-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; background: #eee; }
    .stars { color: #ffd700; font-size: 18px; }
  </style>
</head>
<body>

  <div id="admin-header-container"></div>

  <div class="container">
    
    <div id="table-view">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0">Customer Testimonials</h2>
        <button id="add-btn" class="btn-accent" onclick="showFormMode()">+ New Testimonial</button>
      </div>

      <section class="pending-panel">
        <h3 style="margin:0 0 10px 0;">Pending Authorisation</h3>
        <table id="pendingTable">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Submitted</th>
              <th>Rating</th>
              <th>Photos</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <h3 style="margin:0 0 10px 0;">Published Testimonials</h3>
      <table id="testimonialTable">
        <thead>
          <tr>
            <th>Customer</th>
            <th>Date</th>
            <th>Type</th>
            <th>Rating</th>
            <th style="text-align: right;">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="form-view" class="hidden">
      <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 20px;">
        <h2 id="formTitle" style="margin:0">Add Testimonial</h2>
        <button class="btn-outline" onclick="showTableMode()">Cancel & Close</button>
      </div>

      <div class="form-grid">
        <div class="form-left">
          <label>Review Category</label>
          <select id="review_type" onchange="toggleImageSection()">
            <option value="standard">Standard (Text Only)</option>
            <option value="photo">Photo Review (With Gallery)</option>
          </select>

          <label>Customer Name</label>
          <input id="customer_name" placeholder="e.g. Sarah Jenkins">

          <label>Customer Email</label>
          <input id="customer_email" type="email" placeholder="e.g. customer@example.com">

          <label>Customer Phone</label>
          <input id="customer_phone" placeholder="e.g. 07985 292527">

          <label>Review Date</label>
          <input id="review_date" type="date">

          <label>Star Rating</label>
          <select id="rating">
            <option value="5">5 Stars</option>
            <option value="4">4 Stars</option>
            <option value="3">3 Stars</option>
            <option value="2">2 Stars</option>
            <option value="1">1 Star</option>
          </select>

          <label>Punchy Subject Line</label>
          <input id="subject" placeholder="e.g. Fast Boiler Repair">

          <label>Review Content</label>
          <textarea id="content" rows="6" placeholder="Paste the customer review here..."></textarea>

          <label>Admin Notes</label>
          <textarea id="admin_notes" rows="3" placeholder="Internal notes for pending submissions..."></textarea>

          <button id="saveBtn" class="btn-primary" style="width:100%; padding:15px;" onclick="saveTestimonial()">Save Testimonial</button>
          <button id="approveBtn" class="btn-accent hidden" style="width:100%; padding:15px; margin-top:10px;" onclick="approvePendingTestimonial()">Approve & Publish</button>
        </div>

        <div class="form-right" id="image-section">
          <label style="font-weight: bold; color: var(--primary-blue);">Review Images</label>
          <div id="image-gallery">
            <p id="no-images-msg" style="color:#999; font-size:14px; grid-column: 1/-1;">No photos selected</p>
          </div>
          <input type="file" id="image-input" accept="image/*" multiple style="display:none;" onchange="previewFiles()">
          <button class="btn-accent" id="upload-btn" onclick="document.getElementById('image-input').click()" style="margin-top:20px;">Add Multiple Photos</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    /* 1. INITIALIZATION & SECURITY */
    let editingId = null;
    let editingPendingId = null;
    let existingImageUrls = []; 
    let selectedFiles = [];

    async function checkSecurity() {
      const lib = window.supabase || window.Supabase;
      if (!lib) { setTimeout(checkSecurity, 50); return; }

      // Assign to window.db so the admin-include.js logout function can see it
      window.db = lib.createClient(
        'https://axampuprcnauxbbijmmt.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4YW1wdXByY25hdXhiYmlqbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDgyNjUsImV4cCI6MjA5MzMyNDI2NX0.Er1hMQbaXnR4hzHfR2my0SmtwUcUs49HaCVqYwMBHuQ'
      );

      const { data: { session } } = await window.db.auth.getSession();
      
      if (!session) { 
        window.location.href = 'login.html'; 
        return; 
      }
      
      // LOAD THE MODULAR HEADER
      await window.loadAdminHeader(session);
      
      // REVEAL PAGE & LOAD DATA
      document.body.style.visibility = 'visible'; 
      loadPendingTestimonials();
      loadTestimonials(); 
    }

    // Header logout integration
    window.handleLogout = async () => {
      await window.db.auth.signOut();
      window.location.href = 'login.html';
    };

    /* 2. TESTIMONIALS LOGIC */

    function showFormMode() {
      document.getElementById('table-view').classList.add('hidden');
      document.getElementById('form-view').classList.remove('hidden');
      toggleImageSection();
    }

    function showTableMode() {
      document.getElementById('form-view').classList.add('hidden');
      document.getElementById('table-view').classList.remove('hidden');
      resetForm();
    }

    function toggleImageSection() {
      const type = document.getElementById('review_type').value;
      const section = document.getElementById('image-section');
      const btn = document.getElementById('upload-btn');
      section.style.opacity = (type === 'standard') ? '0.4' : '1';
      btn.disabled = (type === 'standard');
    }

    function previewFiles() {
      const files = Array.from(document.getElementById('image-input').files);
      const gallery = document.getElementById('image-gallery');
      selectedFiles = files;
      renderImageGallery();
      if (files.length && !existingImageUrls.length) gallery.innerHTML = '';
      files.forEach(file => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `<img src="${URL.createObjectURL(file)}" class="gallery-img" alt="">`;
        gallery.appendChild(item);
      });
    }

    function renderImageGallery() {
      const gallery = document.getElementById('image-gallery');
      const existing = existingImageUrls.map((url, index) => `
        <div class="gallery-item">
          <img src="${url}" class="gallery-img" alt="">
          <button class="gallery-remove" type="button" onclick="removeExistingImage(${index})">x</button>
        </div>
      `).join('');

      gallery.innerHTML = existing || '<p id="no-images-msg" style="color:#999; font-size:14px; grid-column: 1/-1;">No photos selected</p>';
    }

    window.removeExistingImage = (index) => {
      existingImageUrls.splice(index, 1);
      renderImageGallery();
    };

    async function uploadSelectedImages() {
      if (!selectedFiles.length) return [];
      const uploadPromises = selectedFiles.map(async (file) => {
        const fileName = `review-${Date.now()}-${file.name}`;
        const { error } = await window.db.storage.from('testimonial-images').upload(fileName, file);
        if (error) throw error;
        return window.db.storage.from('testimonial-images').getPublicUrl(fileName).data.publicUrl;
      });
      return Promise.all(uploadPromises);
    }

    async function loadPendingTestimonials() {
      const { data, error } = await window.db
        .from('testimonial_submissions')
        .select('*')
        .eq('status', 'pending')
        .order('created_at', { ascending: false });
      if (error) {
        console.error(error);
        return;
      }

      const tbody = document.querySelector('#pendingTable tbody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:#777;">No pending testimonials.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map((item) => `
        <tr>
          <td>
            <strong>${item.customer_name}</strong><br>
            <span style="font-size:12px;color:#666;">${item.customer_email || ''}</span>
          </td>
          <td>${new Date(item.created_at).toLocaleDateString('en-GB')}</td>
          <td class="stars">${'★'.repeat(item.rating)}</td>
          <td>${(item.image_urls || []).length}</td>
          <td style="text-align:right;">
            <span class="status-pill">Pending</span>
            <button class="btn-outline" onclick="editPendingTestimonial('${item.id}')">Review</button>
            <button class="btn-outline" style="color:red; border-color:rgba(255,0,0,0.1)" onclick="rejectPendingTestimonial('${item.id}')">Reject</button>
          </td>
        </tr>
      `).join('');
    }

    async function loadTestimonials() {
      const { data, error } = await window.db.from('testimonials').select('*').order('review_date', { ascending: false });
      if (error) return console.error(error);

      const tbody = document.querySelector('#testimonialTable tbody');
      
      tbody.innerHTML = data.map(t => {
        const formattedDate = new Date(t.review_date).toLocaleDateString('en-GB');
        const ageInfo = getReviewAgeInfo(t.review_date);

        return `
          <tr>
            <td><strong>${t.customer_name}</strong></td>
            <td>
              <div style="font-size: 14px;">${formattedDate}</div>
              <div style="font-size: 11px; font-weight: bold; color: ${ageInfo.color};">
                ${ageInfo.ageText}
              </div>
            </td>
            <td><span class="type-badge">${t.review_type}</span></td>
            <td class="stars">${'★'.repeat(t.rating)}</td>
            <td style="text-align: right;">
              <button class="btn-outline" onclick="editTestimonial('${t.id}')">Edit</button>
              <button class="btn-outline" style="color:red; border-color:rgba(255,0,0,0.1)" onclick="deleteTestimonial('${t.id}')">Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function getReviewAgeInfo(dateStr) {
      const now = new Date();
      const reviewDate = new Date(dateStr);
      const diffInMs = now - reviewDate;
      const diffInDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24));

      let ageText = "";
      let color = "inherit";

      if (diffInDays <= 31) {
        ageText = `${diffInDays} day${diffInDays === 1 ? '' : 's'} ago`;
      } else if (diffInDays < 365) {
        const months = Math.floor(diffInDays / 30.44);
        ageText = `${months} month${months === 1 ? '' : 's'} ago`;
      } else {
        const years = Math.floor(diffInDays / 365);
        ageText = `${years} year${years === 1 ? '' : 's'} ago`;
        if (years >= 2) color = "#ef4444"; 
        else if (years >= 1) color = "#ff8c00"; 
      }
      return { ageText, color };
    }   

    async function saveTestimonial() {
      if (editingPendingId) {
        try {
          await savePendingChanges();
          showTableMode();
          loadPendingTestimonials();
        } catch (err) {
          alert(err.message);
        }
        return;
      }

      const name = document.getElementById('customer_name').value.trim();
      const type = document.getElementById('review_type').value;
      if (!name) return alert("Customer name is required");

      const uploadedUrls = type === 'photo' ? await uploadSelectedImages() : [];
      const finalImageUrls = type === 'photo' ? [...existingImageUrls, ...uploadedUrls] : [];

      const payload = {
        customer_name: name,
        subject: document.getElementById('subject').value,
        review_date: document.getElementById('review_date').value,
        review_type: type,
        rating: parseInt(document.getElementById('rating').value),
        content: document.getElementById('content').value,
        image_urls: finalImageUrls
      };

      const { error } = editingId ? 
        await window.db.from('testimonials').update(payload).eq('id', editingId) : 
        await window.db.from('testimonials').insert([payload]);

      if (error) alert(error.message);
      else {
        showTableMode();
        loadPendingTestimonials();
        loadTestimonials();
      }
    }

    window.editTestimonial = async (id) => {
      const { data } = await window.db.from('testimonials').select('*').eq('id', id).single();
      if (!data) return;
      editingId = id;
      editingPendingId = null;
      existingImageUrls = data.image_urls || [];
      selectedFiles = [];
      showFormMode();
      document.getElementById('formTitle').textContent = 'Edit Review';
      document.getElementById('saveBtn').textContent = 'Save Testimonial';
      document.getElementById('approveBtn').classList.add('hidden');
      document.getElementById('customer_name').value = data.customer_name;
      document.getElementById('customer_email').value = '';
      document.getElementById('customer_phone').value = '';
      document.getElementById('review_date').value = data.review_date;
      document.getElementById('review_type').value = data.review_type;
      document.getElementById('rating').value = data.rating;
      document.getElementById('subject').value = data.subject;
      document.getElementById('content').value = data.content;
      
      document.getElementById('admin_notes').value = '';
      renderImageGallery();
      toggleImageSection();
    };

    window.editPendingTestimonial = async (id) => {
      const { data } = await window.db.from('testimonial_submissions').select('*').eq('id', id).single();
      if (!data) return;
      editingId = null;
      editingPendingId = id;
      existingImageUrls = data.image_urls || [];
      selectedFiles = [];
      showFormMode();
      document.getElementById('formTitle').textContent = 'Review Pending Testimonial';
      document.getElementById('saveBtn').textContent = 'Save Pending Changes';
      document.getElementById('approveBtn').classList.remove('hidden');
      document.getElementById('customer_name').value = data.customer_name;
      document.getElementById('customer_email').value = data.customer_email || '';
      document.getElementById('customer_phone').value = data.customer_phone || '';
      document.getElementById('review_date').value = data.review_date || new Date().toISOString().slice(0, 10);
      document.getElementById('review_type').value = existingImageUrls.length ? 'photo' : 'standard';
      document.getElementById('rating').value = data.rating || 5;
      document.getElementById('subject').value = data.subject || '';
      document.getElementById('content').value = data.content || '';
      document.getElementById('admin_notes').value = data.admin_notes || '';
      renderImageGallery();
      toggleImageSection();
    };

    async function savePendingChanges() {
      const uploadedUrls = document.getElementById('review_type').value === 'photo' ? await uploadSelectedImages() : [];
      const imageUrls = document.getElementById('review_type').value === 'photo' ? [...existingImageUrls, ...uploadedUrls] : [];
      const payload = {
        customer_name: document.getElementById('customer_name').value.trim(),
        customer_email: document.getElementById('customer_email').value.trim(),
        customer_phone: document.getElementById('customer_phone').value.trim(),
        review_date: document.getElementById('review_date').value,
        rating: parseInt(document.getElementById('rating').value),
        subject: document.getElementById('subject').value,
        content: document.getElementById('content').value,
        image_urls: imageUrls,
        admin_notes: document.getElementById('admin_notes').value
      };
      const { error } = await window.db.from('testimonial_submissions').update(payload).eq('id', editingPendingId);
      if (error) throw error;
      existingImageUrls = imageUrls;
      selectedFiles = [];
      document.getElementById('image-input').value = '';
      renderImageGallery();
    }

    async function approvePendingTestimonial() {
      if (!editingPendingId) return;
      try {
        await savePendingChanges();
        const reviewType = existingImageUrls.length ? 'photo' : 'standard';
        const payload = {
          customer_name: document.getElementById('customer_name').value.trim(),
          subject: document.getElementById('subject').value,
          review_date: document.getElementById('review_date').value || new Date().toISOString().slice(0, 10),
          review_type: reviewType,
          rating: parseInt(document.getElementById('rating').value),
          content: document.getElementById('content').value,
          image_urls: existingImageUrls
        };
        const { data, error } = await window.db.from('testimonials').insert([payload]).select('id').single();
        if (error) throw error;
        await window.db.from('testimonial_submissions').update({
          status: 'approved',
          approved_testimonial_id: data.id
        }).eq('id', editingPendingId);
        showTableMode();
        loadPendingTestimonials();
        loadTestimonials();
      } catch (err) {
        alert(err.message);
      }
    }

    window.rejectPendingTestimonial = async (id) => {
      if (!confirm('Reject this testimonial submission?')) return;
      await window.db.from('testimonial_submissions').update({ status: 'rejected' }).eq('id', id);
      loadPendingTestimonials();
    };

    window.deleteTestimonial = async (id) => {
      if (!confirm('Delete this testimonial?')) return;
      await window.db.from('testimonials').delete().eq('id', id);
      loadTestimonials();
    };

    window.resetForm = () => {
      editingId = null;
      editingPendingId = null;
      existingImageUrls = [];
      selectedFiles = [];
      document.getElementById('formTitle').textContent = 'Add Testimonial';
      document.getElementById('saveBtn').textContent = 'Save Testimonial';
      document.getElementById('approveBtn').classList.add('hidden');
      document.getElementById('customer_name').value = '';
      document.getElementById('customer_email').value = '';
      document.getElementById('customer_phone').value = '';
      document.getElementById('review_date').value = '';
      document.getElementById('review_type').value = 'standard';
      document.getElementById('rating').value = '5';
      document.getElementById('subject').value = '';
      document.getElementById('content').value = '';
      document.getElementById('admin_notes').value = '';
      document.getElementById('image-input').value = '';
      document.getElementById('image-gallery').innerHTML = '<p id="no-images-msg" style="color:#999; font-size:14px; grid-column: 1/-1;">No photos selected</p>';
    };

    // RUN ON LOAD
    checkSecurity();
  </script>
</body>
</html>
