    <!-- Booking Options -->

      <a class="info-tile" id="call-to-book" data-contact-action="general" href="tel:08007566748">
  <img src="assets/images/annual-servicing.jpg" alt="Call to book" />

</a>

      <a class="info-tile" data-contact-action="emergency" href="tel:08007566748,0">

      </a>
	  
	  <a class="info-tile" data-contact-action="email" href="mailto:info@warmright.uk?subject=Online%20Booking&body=Hello,%0A%0APlease%20could%20you%20email%20me%20with%20your%20availability.%0A%0AI%20would%20like%20to%20book%20in%20a%20(INSERT%20SERVICE).%0A%0AThank%20you,">

      </a>

     </a>
